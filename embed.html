<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор растаможки из Китая — ДалДобро</title>
<meta name="robots" content="noindex">
<style>
:root{--bg:#0a0f1c;--card:rgba(23,30,48,.6);--line:rgba(120,140,190,.16);--txt:#eaf0fb;--mut:#9aa8c6;--acc:#5b8cff;--good:#2fbf71}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:14px}
.w{max-width:420px;margin:0 auto}
.h{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:10px}
.h img{width:22px;height:22px}.h b{background:linear-gradient(90deg,#7db0ff,#7c5cff);-webkit-background-clip:text;background-clip:text;color:transparent}
label{display:block;font-size:12px;color:var(--mut);margin:9px 0 4px}
input{width:100%;padding:11px 12px;background:rgba(10,15,28,.7);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:14px}
input:focus{outline:none;border-color:var(--acc)}
.btn{margin-top:12px;width:100%;padding:12px;border:0;border-radius:10px;font-weight:800;font-size:14px;color:#fff;cursor:pointer;background:linear-gradient(100deg,#5b8cff,#7c5cff)}
.res{margin-top:12px;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--card);display:none}
.res.show{display:block}
.row{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0;border-bottom:1px solid var(--line)}
.row:last-child{border:0}.row b{font-variant-numeric:tabular-nums}
.code{font-weight:800;color:#8fb0ff}
.tot{font-size:18px;font-weight:900;margin-top:6px}
.tot b{background:linear-gradient(90deg,#7db0ff,#3ad7c8);-webkit-background-clip:text;background-clip:text;color:transparent}
.foot{margin-top:12px;text-align:center;font-size:12px}
.foot a{color:#8fb4ff;text-decoration:none;font-weight:700}
.err{color:#ff6a5a;font-size:12.5px;margin-top:8px;min-height:1px}
</style></head>
<body><div class="w">
<div class="h"><img src="https://www.daldobro.ru/logo.png" alt="">Калькулятор растаможки из Китая · <b>ДалДобро</b></div>
<label>Наименование товара</label>
<input id="t" placeholder="например: холодильник бытовой" onkeydown="if(event.key==='Enter')calc()">
<div style="display:flex;gap:8px">
  <div style="flex:1"><label>Стоимость товара, ₽</label><input id="g" type="number" placeholder="45 000"></div>
  <div style="flex:1"><label>Доставка, ₽</label><input id="f" type="number" placeholder="8 000"></div>
</div>
<button class="btn" onclick="calc()">Рассчитать →</button>
<div class="err" id="e"></div>
<div class="res" id="r">
  <div class="row"><span>Код ТН ВЭД</span><b class="code" id="cd"></b></div>
  <div class="row"><span id="dl">Пошлина</span><b id="du"></b></div>
  <div class="row"><span id="vl">НДС</span><b id="va"></b></div>
  <div class="row tot"><span>Итого себестоимость</span><b id="to"></b></div>
</div>
<div class="foot"><a id="full" href="https://www.daldobro.ru/" target="_blank" rel="noopener">Полный расчёт с маршрутами и ставками на ДалДобро →</a></div>
</div>
<script>
var API='https://api.201-51-30-177.sslip.io';
function f(n){return new Intl.NumberFormat('ru-RU').format(Math.round(n))+' ₽';}
async function calc(){
  var t=document.getElementById('t').value.trim(),g=document.getElementById('g').value||0,fr=document.getElementById('f').value||0,e=document.getElementById('e');
  e.textContent='';
  if(t.length<2){e.textContent='Введите наименование товара.';return;}
  try{
    var d=await(await fetch(API+'/quote?term='+encodeURIComponent(t)+'&goods='+g+'&freight='+fr+'&qty=1')).json();
    if(d.error){e.textContent=d.error;return;}
    var c=d.calc||{};
    document.getElementById('cd').textContent=(d.code||'').replace(/(\d{4})(\d{2})(\d{4})/,'$1 $2 $3');
    document.getElementById('dl').textContent='Пошлина'+(c.duty_note?' ('+c.duty_note.replace(' (ЕТТ)','')+')':'');
    document.getElementById('full').href='https://www.daldobro.ru/?term='+encodeURIComponent(t)+'&goods='+g;
    if(c.duty!=null){
      document.getElementById('du').textContent=f(c.duty);
      document.getElementById('vl').textContent='НДС '+c.vat_rate+'%';
      document.getElementById('va').textContent=f(c.vat);
      document.getElementById('to').textContent=f(c.total);
    }else{
      document.getElementById('du').textContent='нужно кол-во';
      document.getElementById('vl').textContent='НДС '+c.vat_rate+'%';document.getElementById('va').textContent='—';
      document.getElementById('to').innerHTML='<a href="https://www.daldobro.ru/?term='+encodeURIComponent(t)+'" target="_blank" style="color:#8fb4ff">указать на сайте →</a>';
    }
    document.getElementById('r').classList.add('show');
  }catch(err){e.textContent='Сервис временно недоступен.';}
}
try{fetch(API+'/ev',{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify([{t:'visit',a:'embed',s:'embed',p:'/embed',d:'embed',r:(document.referrer||'').replace(/^https?:\/\//,'').split('/')[0]}])});}catch(e){}
</script></body></html>
